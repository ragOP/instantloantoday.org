<!DOCTYPE html>
<html lang="fr-CA">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prêt personnel – Canada</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,#0a2d6e,#1565c0);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;}
    .card{background:#fff;border-radius:20px;padding:32px 28px 28px;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.22);}
    .badge-wrap{text-align:center;margin-bottom:16px;}
    .badge{display:inline-block;background:#e8f0fe;color:#0f6ff9;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:5px 13px;border-radius:100px;}
    .prog-wrap{margin-bottom:22px;}
    .prog-meta{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#aaa;margin-bottom:6px;}
    .prog-meta span:last-child{color:#0f6ff9;}
    .prog-track{background:#eef1f7;border-radius:100px;height:8px;overflow:hidden;}
    .prog-fill{height:100%;width:0%;background:#0f6ff9;border-radius:100px;transition:width 1s ease;}
    .qlabel{font-size:13px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    h1{font-size:26px;font-weight:800;color:#0d1b2a;line-height:1.2;margin-bottom:24px;}
    .opts{display:flex;flex-direction:column;gap:10px;}
    .opt{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#f5f8ff;border:2px solid #0f6ff9;border-radius:13px;text-decoration:none;color:#0d1b2a;font-size:15px;font-weight:600;transition:all .15s ease;}
    .opt:hover{background:#0f6ff9;color:#fff;transform:translateY(-1px);box-shadow:0 6px 18px rgba(15,111,249,.3);}
    .opt:hover .ico{background:rgba(255,255,255,.18);}
    .ico{font-size:18px;background:#fff;width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:background .15s;}
    .lbl{flex:1;text-align:left;}
    .arr{font-size:18px;opacity:.45;}
    .trust{margin-top:20px;text-align:center;font-size:13px;font-weight:600;color:#555;display:flex;align-items:center;justify-content:center;gap:6px;}
    .trust .hi{color:#0f6ff9;}
  </style>
</head>
<body>
<div class="card">
  <div class="badge-wrap"><span class="badge">🇨🇦 Disponible partout au Canada</span></div>
  <div class="prog-wrap">
    <div class="prog-meta"><span>Étape 1 sur 2</span><span>50 % complété</span></div>
    <div class="prog-track"><div class="prog-fill" id="bar"></div></div>
  </div>
  <p class="qlabel">Question rapide :</p>
  <h1>Pourquoi avez-vous besoin du prêt?</h1>
  <div class="opts">
    <a class="opt" href="https://cmi.rocks/go/69b993373ce35"><div class="ico">💳</div><span class="lbl">Rembourser des dettes</span><span class="arr">›</span></a>
    <a class="opt" href="https://cmi.rocks/go/69b993373ce35"><div class="ico">🏠</div><span class="lbl">Dépenses à la maison</span><span class="arr">›</span></a>
    <a class="opt" href="https://cmi.rocks/go/69b993373ce35"><div class="ico">🚗</div><span class="lbl">Voiture ou transport</span><span class="arr">›</span></a>
    <a class="opt" href="https://cmi.rocks/go/69b993373ce35"><div class="ico">📋</div><span class="lbl">Autres dépenses</span><span class="arr">›</span></a>
  </div>
  <div class="trust">🔒 <span><span class="hi">Des milliers de Canadiens</span> approuvés ce mois-ci</span></div>
</div>
<script>setTimeout(()=>{document.getElementById('bar').style.width='50%'},100);</script>
</body>
</html>
