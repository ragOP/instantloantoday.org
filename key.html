let af='all';
function f(x){af=x;document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',b.dataset.f===x));go();}
function fv(v){return v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'K':v;}
function vc(v){return v>=500000?'v5':v>=50000?'v4':v>=5000?'v3':v>=500?'v2':'v1';}
function ti(y){if(y==='0%')return'<span class="tf">stable</span>';if(y==='-99%')return'<span class="td">↓↓</span>';if(y.startsWith('-'))return`<span class="td">↓${y}</span>`;return`<span class="tu">↑${y}</span>`;}

function go(){
  const q=document.getElementById('s').value.toLowerCase();
  let d=D.filter(x=>{
    if(q&&!x[0].includes(q))return false;
    const[,v,c,,,,a,t,fr]=x;
    if(af==='fire')return fr===1;
    if(af==='test')return t==='y';
    if(af==='500k')return v>=500000;
    if(af==='50k')return v>=50000&&v<500000;
    if(af==='5k')return v>=5000&&v<50000;
    if(af==='low')return c==='L';
    if(['cheap','compare','coverage','savings','lowincome','nodeposit','overpay','intent','geo','bundle','special','demo'].includes(af))return a===af;
    return true;
  });
  const fire=d.filter(x=>x[8]===1).length;
  const tc=d.filter(x=>x[7]==='y').length;
  const lc=d.filter(x=>x[2]==='L').length;
  const tv=d.reduce((s,x)=>s+x[1],0);
  const penny=d.filter(x=>x[3]>0&&x[3]<2&&x[2]!=='H').length;
  document.getElementById('sm').innerHTML=`
    <div class="scf"><div class="n">${d.length}</div><div class="l">total keywords</div></div>
    <div class="scf"><div class="n">${fire}</div><div class="l">🔥 fire picks</div></div>
    <div class="sc"><div class="n">${tc}</div><div class="l">✓ test them</div></div>
    <div class="sc"><div class="n">${lc}</div><div class="l">low competition</div></div>
    <div class="sc"><div class="n">${penny}</div><div class="l">penny bids (&lt;$2)</div></div>
    <div class="sc"><div class="n">${fv(tv)}</div><div class="l">total mo. searches</div></div>
  `;
  let h='';let lt='';
  d.forEach((x,i)=>{
    const[kw,v,c,bl,bh,y,a,t,fr]=x;
    const tier=v>=500000?'★ 500K / month':v>=50000?'50K / month':v>=5000?'5K / month':'500 / month';
    if(tier!==lt){h+=`<tr class="sh"><td colspan="8">${tier}</td></tr>`;lt=tier;}
    const cc=c==='H'?'cH':c==='M'?'cM':'cL';
    const tc2=t==='y'?'ty':t==='m'?'tm':'ts';
    const tl=t==='y'?'✓ Test':t==='m'?'Maybe':'Skip';
    const bc=(bl>0&&bl<2&&c!=='H')?'bidf':'bid';
    const fb=fr===1?'<span class="fb2">🔥</span>':'';
    const rc=fr===1?'fr':'';
    h+=`<tr class="${rc}" title="${kw}">
      <td style="color:#aaa;font-size:10px">${i+1}</td>
      <td>${kw}${fb}</td>
      <td class="vol ${vc(v)}">${fv(v)}</td>
      <td><span class="pill ${cc}">${c==='H'?'High':c==='M'?'Medium':'Low'}</span></td>
      <td class="${bc}">${bl>0?'$'+bl+'–$'+bh:'—'}</td>
      <td>${ti(y)}</td>
      <td><span class="ang ${AL[a]||'a-cheap'}">${LL[a]||a}</span></td>
      <td><span class="${tc2}">${tl}</span></td>
    </tr>`;
  });
  document.getElementById('tb').innerHTML=h||'<tr><td colspan="8" style="padding:2rem;text-align:center;color:#888">No results</td></tr>';
}
